name: "Build iOS App"

on:
  workflow_dispatch: # Yeh aapko manually action run karne ka option dega
  push:
    branches:
      - main
      - master

jobs:
  build_ios:
    name: Build iOS IPA
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Dependencies
        run: flutter pub get

      - name: Build iOS Application (Unsigned)
        run: flutter build ios --release --no-codesign

      - name: Create IPA payload
        run: |
          mkdir -p Payload
          mv build/ios/iphoneos/Runner.app Payload/
          zip -r -q app.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v3
        with:
          name: ios-app-release
          path: app.ipa
